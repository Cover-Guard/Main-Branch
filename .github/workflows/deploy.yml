name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Database migrations (run first, before deploying code) ───────────────────
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --workspace=@coverguard/api
      - name: Run Prisma migrations
        working-directory: apps/api
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Deploy API to Render ──────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API → api.coverguard.io
    runs-on: ubuntu-latest
    needs: migrate
    environment: production
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail-with-body
        # Set RENDER_DEPLOY_HOOK_URL in GitHub secrets (from Render dashboard).
        # Render runs the Express API as a Web Service using apps/api/Dockerfile.

  # ── Deploy Web to Base44 ──────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web → coverguard.io (Base44)
    runs-on: ubuntu-latest
    needs: deploy-api
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies & build shared package
        run: npm ci && npm run build --workspace=@coverguard/shared

      - name: Build web (static export)
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: https://api.coverguard.io
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}

      - name: Set up Base44 auth
        run: |
          mkdir -p ~/.base44/auth
          echo '${{ secrets.BASE44_AUTH_JSON }}' > ~/.base44/auth/auth.json
        # BASE44_AUTH_JSON: copy the contents of ~/.base44/auth/auth.json after
        # running `npx base44 login` locally, then store as a GitHub secret.

      - name: Inject Base44 app config
        working-directory: apps/web
        run: |
          echo '{"id":"${{ secrets.BASE44_APP_ID }}"}' > base44/.app.jsonc
        # BASE44_APP_ID: run `npx base44 link` locally, then copy the id from
        # apps/web/base44/.app.jsonc and store as a GitHub secret.

      - name: Deploy to Base44
        working-directory: apps/web
        run: npx base44 site deploy -y

  # ── Deployment summary ───────────────────────────────────────────────────────
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-api]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Web | https://coverguard.io | ${{ needs.deploy-web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API | https://api.coverguard.io | ${{ needs.deploy-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} | — |" >> $GITHUB_STEP_SUMMARY
