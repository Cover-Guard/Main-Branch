name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── Database migrations (run first, before deploying code) ───────────────────
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --workspace=@coverguard/api
      - name: Run Prisma migrations
        working-directory: apps/api
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Build & push API Docker image ─────────────────────────────────────────────
  build-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: migrate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/coverguard-api:latest
            ${{ env.REGISTRY }}/coverguard-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & push Web Docker image ─────────────────────────────────────────────
  build-web:
    name: Build & Push Web Image
    runs-on: ubuntu-latest
    needs: migrate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/coverguard-web:latest
            ${{ env.REGISTRY }}/coverguard-web:${{ env.IMAGE_TAG }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_API_URL=${{ secrets.PRODUCTION_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to production server ───────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    environment: production
    permissions:
      contents: read
    steps:
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 120s
          script: |
            set -euo pipefail
            cd /opt/coverguard
            export DOCKER_REGISTRY=${{ secrets.DOCKER_REGISTRY }}
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --no-deps api
            # Wait for API health check before rolling the web container
            MAX_ATTEMPTS=24
            for i in $(seq 1 $MAX_ATTEMPTS); do
              if wget -qO- http://localhost:4000/health | grep -q '"status":"ok"'; then
                echo "API is healthy"
                break
              fi
              echo "Waiting for API... ($i/$MAX_ATTEMPTS)"
              sleep 5
            done
            docker compose -f docker-compose.prod.yml up -d --no-deps web
            docker image prune -f

  # ── Deployment summary ───────────────────────────────────────────────────────
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [build-api, build-web, deploy]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Web | https://coverguard.io | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API | https://api.coverguard.io | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API image | \`${{ env.REGISTRY }}/coverguard-api:${{ env.IMAGE_TAG }}\` | ${{ needs.build-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web image | \`${{ env.REGISTRY }}/coverguard-web:${{ env.IMAGE_TAG }}\` | ${{ needs.build-web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` | — |" >> $GITHUB_STEP_SUMMARY
